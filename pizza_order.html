<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Online Order Form</title>
</head>
<body>

    <div>
        <h1>PIZZA by the SLICE</h1>
    </div>

    <hr>
   

    <br><br>

    <form action="#" method="post">

        <label for="info">Personal Information:</label>

        <br><br>

        <label for="name">Name:</label>
        <input type="text" minlength="5" maxlength="60" id="name" name="name" required>

        <br><br>
        
        <label for="email">Email:</label>
        <input type="text" id="email" name="email" inputmode="email" required>

        <br><br>

        <label for="phone">Phone Number:</label>
        <input type="tel" id="phone" name="phone" pattern="[0-9]{7,11}" required>

        <br><br>

        <label for="age">Age:</label>
        <input type="number" id="age" name="age" inputmode="numeric" min="13" max="99" required>

        <br><br>
        

        <button type="submit">Submit</button>

        <br><br>

        <hr>

        <p>Pizza Size:</p>

        <label>
        <input type="radio" name="size" value="small" required> Small
        </label>
        
        <br>

        <label>
        <input type="radio" name="size" value="medium"> Medium
        </label>
        
        <br>

        <label>
        <input type="radio" name="size" value="large"> Large
        </label>

        <br>

        <label for="crust_type">Crust Type:</label>

        <select name="crust" id="crust">
            <option value="" disabled selected>--Choose a crust--</option>
            <option value="thick">Thick Crust</option>
            <option value="thin">Thin Crust</option>
            <option value="stuffed">Stuffed Crust</option>
            <option value="sicilian">Sicilian Crust</option>
            <option value="gluten-free">Gluten-Free Crust</option>
            <option value="neapolitan">Neapolitan Crust</option>
            <option value="nys">New York Style Crust</option>
        </select>    
        
        <br><br>

        <label for="sauce">Sauce:</label>

        <br><br>

        <select name="sauce" id="sauce" required>
            
            <option value="" disabled selected>--Choose a sauce--</option>
           
            <option value="none">No Sauce</option>

            <optgroup label="Classic">
                <option value="tomato">Tomato</option>
                <option value="garlic">Garlic White</option>
            </optgroup>
            
            <optgroup label="Special">
                <option value="pesto">Pesto</option>
                <option value="bbq">Barbecue</option>
            </optgroup>

            <br>

        </select>

        <br><br>

        <label for="toppings">Toppings</label>
        
        <br><br>

        <label>
            <input type="checkbox" checked disabled name="toppings" value="cheese"> Cheese
        </label>

        <br>

        <label>
            <input type="checkbox" name="toppings" value="pepperoni"> Pepperoni
        </label>

        <br>

        <label>
            <input type="checkbox" name="toppings" value="mushrooms"> Mushrooms
        </label>

        <br>

        <label>
            <input type="checkbox" name="toppings" value="onions"> Onions
        </label>

        <br>

        <label>
            <input type="checkbox" name="toppings" value="bell_pepper"> Bell Pepper
        </label>

        <br>

        <label>
            <input type="checkbox" name="toppings" value="olives"> Olives
        </label>

        <br>

        <label>
            <input type="checkbox" name="toppings" value="bacon"> Bacon
        </label>

        <br>

        <label title="Warning: Pineapple on pizza is controversial!">
            <input type="checkbox" name="toppings" value="pineapple"> Pineapple
        </label>

        <br><br>
        
    
            
            <fieldset>
                <legend>Payment Details</legend>
                
                <label for="delivery_method">Delivery Method:</label>
        
        <br><br>

        <label>
            <input type="radio" name="delivery_method" value="home_delivery"checked> Home Delivery
        </label>

        <br>

        <label>
            <input type="radio" name="delivery_method" value="store_pickup"> Store Pickup
        </label>

        <br><br>

        <label for="address">Address:</label>

        <br><br>

        <textarea name="address" id="address" rows="4" cols="50" placeholder="Enter your address here..."></textarea>

        <br><br>

        <label for="payment_information">Payment Information:</label>
            <select name="payment" id="payment">
                <option value="credit_card">Credit Card</option>
                <option value="gcash">GCash</option>
                <option value="cod">Cash on Delivery</option>
            </select>

            <br><br>

            <label for="credit_card"> Credit Card Number:
                <input type="text" id="card" name="card" pattern="[0-9]{16}" placeholder="1234567890123456" required>
                <br>
                (Required for Credit Card only)
            </label>
            </fieldset>

            <br><br>

    <label for="order_summary">Order Summary</label>
             
    <table border="1">
        <tr>
            <th>Size</th>
            <th>Base Price</th>
            <th>Extra Toppings (each)</th>
        </tr>

        <tr>
            <td>Small</td>
            <td>₱199</td>
            <td>+₱20</td>
        </tr>

        <tr>
        <td>Medium</td>
            <td>₱299</td>
            <td>+₱25</td>
        </tr>

        <tr>
            <td>Large</td>
            <td>₱399</td>
            <td>+₱30</td>
        </tr>

        <tr>
            <td>Family</td>
            <td>₱499</td>
            <td>+₱35</td>
        </tr>
    </table>


    <br><br>

    <form>
        <input type="submit" value="Place Order">
        <input type="reset" value="Start Over">
    </form>

    </form>
</body>
</html>
